<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practica Card</title>
  <link rel="stylesheet" href="sttyle.css">
</head>
<body>
  <main class="contenedor">
    <div class="card">
      <div class="card__imagen"></div>
      <img src="img/theFlash.png" alt="flash" class="flash">
      <div class="card__texto">
        <h2 class="card__titulo">The Flash</h2>
        <p class="card__descripcion">The Flash es uno de los personajes mas populares de DC Comics y  ha sido parte integral de muchas historias de 'crisis' que cambian con la realidad a lo largo de los años</p>
        <button class="card__button">Mas Info</button>
      </div>
    </div>
  </main>
</body>
</html>
