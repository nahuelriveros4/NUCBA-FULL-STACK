<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario</title>
</head> 
<body>
  <form>
    <label for="name">Nombre:</label>
    <input type="text" id="name" placeholder="Nahuel">
    <br>
    <label for="lastname">Apellido:</label>
    <input type="text" id="lastname" placeholder="Riveros">
    <br>
    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="nucba@gmail.com">
    <br>
    <label for="password">Contraseña:</label>
    <input type="password"  id="password">
    <br>
    <label for="age">Edad:</label>
    <input type="number" id="age">
    <br>
    <span>Elige el tipo de plan</span>
    <br>
    <select >
      <option value="bronce">Bronce</option>
      <option value="plata">plata</option>
      <option value="oro">Oro</option>
    </select>
    <br>
    <label for="free">Free</label>
    <input type="radio" id="free" name="tipoCuenta">
    <br>
    <label for="premium">Premium</label>
    <input type="radio" id="premium" name="tipoCuenta">
    <br>
    <label for="texto">Sugerencias</label>
    <br>
    <textarea name="" id="texto" cols="30" rows="10"></textarea>
    <br>
    <label for="tyc">Acepto los terminos y condiciones</label>
    <input type="checkbox" name="" id="tyc">
    <br>
    <input type="submit">
  </form>
</body>
</html>
