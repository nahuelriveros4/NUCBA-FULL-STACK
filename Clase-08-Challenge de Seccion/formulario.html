<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario</title>
</head>

<body>
  <header>
    <b>
      <h1>Formulario de registro</h1>
    </b>

    <form>
      <label for="name">Nombre: </label>
      <input type="text" name="name" id="name">
      <br><br>
      <label for="lastname">Apellido: </label>
      <input type="text" name="lastname" id="lastname">
      <br><br>
      <span>Modalidad de Cursada</span>
      <input type="radio" name="tipoCursada" id="onDemand">
      <label for="onDemand">On-Demand</label>
      <input type="radio" name="tipoCursada" id="enVivo">
      <label for="enVivo">En Vivo</label>
      <br><br>
      <label for="email">Correo: </label>
      <input type="email" id="email">
      <br><br>
      <input type="checkbox" id="info">
      <label for="info">Deseo recibir informacion sobre nuevos posteos en la plataforma de Nucba</label>
      <br><br>
      <input type="checkbox" name="" id="tyc">
      <label for="tyc">Declaro que lei los terminos y condiciones y estoy listo para convertirme en desarrollador web
        Full Stack</label>
      <br><br>
      <button type="submit">Enviar</button>
    </form>
  </header>
  <br>
  <a href="index.html">Ejercicio CV</a>
  <br>
  <a href="listasAnidadas.html">Ejercicio Listas Anidadas</a>
</body>

</html>
